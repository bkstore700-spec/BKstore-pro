<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Panel</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="admin">
  <div class="container">
    <div class="navbar">
      <a class="brand" href="index.html">
        <img src="logo.png" class="logo-small" />
        <div>
          <div class="title">BK STORE</div>
          <div class="sub">Admin Panel</div>
        </div>
      </a>

      <div class="actions">
        <a class="btn" href="index.html">Store</a>
        <button class="btn red" id="logoutBtn">Logout</button>
      </div>
    </div>

    <div class="panel">
      <h2 style="margin:0 0 10px 0">📊 إحصائيات</h2>
      <div class="row">
        <div class="panel" style="margin:0"><div class="muted">Products</div><div class="title" id="stProducts">0</div></div>
        <div class="panel" style="margin:0"><div class="muted">Orders</div><div class="title" id="stOrders">0</div></div>
        <div class="panel" style="margin:0"><div class="muted">Total Sales</div><div class="title" id="stSales">0</div></div>
        <div class="panel" style="margin:0"><div class="muted">Today Orders</div><div class="title" id="stToday">0</div></div>
      </div>

      <div style="margin-top:12px">
        <div class="muted">Low stock (Top 5)</div>
        <div class="kv" id="lowStock"></div>
      </div>
    </div>

    <div class="panel">
      <h2 style="margin:0 0 10px 0">📦 إضافة / تعديل منتج</h2>

      <form id="productForm">
        <input id="pid" type="hidden" />

        <div class="row">
          <input id="ptitle" placeholder="Title" />
          <input id="pprice" placeholder="Price" type="number" step="0.01" />
        </div>

        <div style="margin-top:10px" class="row">
          <input id="sS" placeholder="Stock S" type="number" min="0" />
          <input id="sM" placeholder="Stock M" type="number" min="0" />
          <input id="sL" placeholder="Stock L" type="number" min="0" />
        </div>

        <div style="margin-top:10px" class="row">
          <input id="sXL" placeholder="Stock XL" type="number" min="0" />
          <input id="sXXL" placeholder="Stock XXL" type="number" min="0" />
          <input id="pimg" type="file" accept="image/*" />
        </div>

        <div style="margin-top:12px; display:flex; gap:10px">
          <button type="button" class="btn red" id="saveBtn">Save</button>
          <button type="button" class="btn" id="clearBtn">Clear</button>
        </div>

        <div class="small" style="margin-top:10px">
          * للتعديل: اضغط Edit على المنتج.
        </div>
      </form>
    </div>

    <div class="panel">
      <h2 style="margin:0 0 10px 0">🧾 المنتجات</h2>
      <div class="grid" id="adminProducts"></div>
    </div>

    <div class="panel">
      <h2 style="margin:0 0 10px 0">📑 الطلبات</h2>
      <table class="table">
        <thead>
          <tr>
            <th>ID</th><th>Name</th><th>Phone</th><th>Payment</th><th>Total</th><th>Date</th><th>Items</th>
          </tr>
        </thead>
        <tbody id="ordersBody"></tbody>
      </table>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>

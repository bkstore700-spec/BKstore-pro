<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Login</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="login">
  <div class="container">
    <div class="navbar">
      <a class="brand" href="index.html">
        <img src="logo.png" class="logo-small" />
        <div>
          <div class="title">BK STORE</div>
          <div class="sub">Admin Login</div>
        </div>
      </a>
      <div class="actions">
        <a class="btn" href="index.html">Store</a>
      </div>
    </div>

    <div class="panel" style="max-width:520px; margin:18px auto">
      <h2 style="margin:0 0 10px 0">🔐 تسجيل دخول الأدمن</h2>
      <input id="username" placeholder="Username" />
      <div style="height:10px"></div>
      <input id="password" type="password" placeholder="Password" />
      <div style="height:12px"></div>
      <button class="btn red" id="loginBtn">Login</button>
      <div class="small" style="margin-top:10px">* ADMIN_USER / ADMIN_PASS داخل .env</div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>

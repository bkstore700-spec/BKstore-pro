<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Login</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="login">
  <div class="container">
    <div class="panel" style="max-width:420px;margin:60px auto">
      <h2 style="margin:0 0 14px 0">🔐 Admin Login</h2>
      <input id="username" placeholder="Username" style="margin-bottom:10px" />
      <input id="password" type="password" placeholder="Password" style="margin-bottom:10px" />
      <button class="btn red" id="loginBtn">Login</button>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
